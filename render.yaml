services:
    - type: web
    name: analizador-paa
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
            - key: GROQ_API_KEY
        sync: false
            - key: MODO_OFFLINE
        value: "True"